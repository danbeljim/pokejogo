<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=0.25, maximum-scale=4.0">
  <title>Pokémon Roguelike</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #5DADE2 0%, #5DADE2 45%, #4A90E2 45%, #4A90E2 55%, #4CAF50 55%, #4CAF50 100%);
    }
    #game-container {
      background: linear-gradient(180deg, #5DADE2 0%, #5DADE2 45%, #4A90E2 45%, #4A90E2 55%, #4CAF50 55%, #4CAF50 100%) !important;
    }
    #game-container canvas {
      background: transparent !important;
    }

    #game-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    /* ── Floating overlay panels ────────────────────── */
    #left-panel, #right-panel {
      position: fixed;
      top: 12px;
      z-index: 200;
      background: transparent;
      padding: 0;
      min-width: 180px;
      max-width: 260px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #111;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Team cards ────────────────────────────────── */
    .panel-label {
      font-size: 9px;
      color: #111;
      margin-bottom: 4px;
    }
    .team-card {
      background: rgba(240,240,220,0.97);
      border: 2px solid #222;
      border-radius: 4px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    }
    .team-card.empty {
      opacity: 0.25;
      justify-content: center;
      min-height: 52px;
      font-size: 18px;
      color: #888;
    }
    .team-card img { width: 52px; height: 52px; image-rendering: pixelated; flex-shrink: 0; }
    .slot-info { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
    .slot-name { font-size: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #111; }
    .slot-level { font-size: 7px; color: #444; }
    .slot-hp-wrap { height: 5px; background: #bbb; border-radius: 3px; overflow: hidden; margin-top: 2px; }
    .slot-hp-bar { height: 100%; border-radius: 3px; }

    /* ── Right panel (items/badges) ─────────────────── */
    .panel-section {
      background: rgba(240,240,220,0.97);
      border: 2px solid #222;
      border-radius: 4px;
      padding: 8px 10px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    }
    .panel-section-label {
      font-size: 8px;
      color: #333;
      margin-bottom: 4px;
      border-bottom: 1px solid #aaa;
      padding-bottom: 3px;
    }
    .panel-info { font-size: 7px; color: #222; line-height: 2; }
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-top: 4px;
    }
    .badge-item {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .badge-item img { width: 100%; height: 100%; image-rendering: pixelated; }
    .panel-btn {
      display: block;
      width: 100%;
      padding: 10px 8px;
      margin-top: 6px;
      background: rgba(200,220,200,0.97);
      border: 2px solid #555;
      border-radius: 3px;
      color: #111;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      cursor: pointer;
      text-align: center;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .panel-btn:hover { background: rgba(160,200,160,0.97); }
    .panel-btn.speed-active { background: rgba(255,220,0,0.97); border-color: #aa8800; }
    .synergy-badge {
      font-size: 6px;
      padding: 4px;
      background: rgba(0,0,0,0.08);
      border-radius: 2px;
      margin-bottom: 4px;
      color: #333;
      text-align: center;
    }

    #rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 22px;
      text-align: center;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 9999;
    }

    @media (max-width: 900px) and (orientation: portrait) {
      #rotate-msg { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-msg">
    <span style="font-size:48px">🔄</span>
    <span>Rota el dispositivo</span>
    <span style="font-size:14px;color:#aaa">El juego requiere modo horizontal</span>
  </div>
  <div id="game-container"></div>
  <div id="left-panel"></div>
  <div id="right-panel"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
