<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, minimum-scale=0.25, maximum-scale=4.0">
  <title>Pokémon Roguelike</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #222;
      overflow: hidden;
    }

    #rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 22px;
      text-align: center;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 9999;
    }

    @media (max-width: 900px) and (orientation: portrait) {
      #rotate-msg { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-msg">
    <span style="font-size:48px">🔄</span>
    <span>Rota el dispositivo</span>
    <span style="font-size:14px;color:#aaa">El juego requiere modo horizontal</span>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
